name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  conformance:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      - run: node bin/til test tests/lang.til
      - run: node bin/til test examples
      - name: error UX contract — broken.til must fail with machine-readable E_NAME
        shell: bash
        run: |
          if node bin/til check examples/broken.til --json > out.json; then
            echo "expected check to fail"; exit 1
          fi
          node -e "const j = JSON.parse(require('fs').readFileSync('out.json', 'utf8')); if (j.errors[0].code !== 'E_NAME' || !j.errors[0].didYouMean) process.exit(1)"
  bench-and-game:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: npm ci
      - run: npm run bench
      - run: node games/flappy/verify.mjs
